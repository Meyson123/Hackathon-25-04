<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Медиахаб</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-logo-admin {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-logo-admin img {
            height: 50px;
            width: auto;
        }
        .dashboard-title h1 {            font-size: 32px;
            font-weight: 700;
            color: #e8e8e8;
            margin: 0 0 5px 0;
        }
        .dashboard-title p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 16px;
            margin: 0;
        }
        .dashboard-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .dashboard-btn {
            background: linear-gradient(135deg, #a855f7, #6366f1);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dashboard-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(168, 85, 247, 0.4);
        }
        .dashboard-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dashboard-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .stat-card.active {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }
        .stat-card.border-purple { border-left: 4px solid #a855f7; }
        .stat-card.border-blue { border-left: 4px solid #3b82f6; }
        .stat-card.border-emerald { border-left: 4px solid #10b981; }
        .stat-card.border-orange { border-left: 4px solid #f97316; }
        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #e8e8e8;
            margin-bottom: 5px;
        }
        .stat-subtext {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
        }
        .stat-subtext.purple { color: #a855f7; }
        .stat-subtext.blue { color: #3b82f6; }
        .stat-subtext.emerald { color: #10b981; }
        .stat-subtext.orange { color: #f97316; }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            color: #e8e8e8;
            margin: 0;
        }
        .table-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .table-title {
            font-size: 18px;
            font-weight: 600;
            color: #e8e8e8;
            margin: 0;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .admin-table td {
            padding: 15px;
            color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .admin-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        .status-badge.pending {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        .status-badge.blocked {
            background: rgba(244, 63, 94, 0.2);
            color: #f43f5e;
        }
        .role-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(254, 243, 131, 0.25);
            color: #FEF383;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.6);
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #a855f7;
        }
        .action-btn.approve:hover {
            background: rgba(16, 185, 129, 0.3);
            color: #10b981;
        }
        .action-btn.reject:hover {
            background: rgba(244, 63, 94, 0.3);
            color: #f43f5e;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.6);
        }
        .loading i {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    
    <script>
        window.userData = {
            id: Number("{{ user.id }}"),
            username: "{{ user.username }}",
            email: "{{ user.email }}",
            role: "{{ user.role }}",
            status: "{{ user.status }}",
            name: "{{ user.full_name }}"
        };
    </script>

    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="/" class="header-logo-admin">
                    <img src="../static/kidik_logo_50x50.png" alt="Logo">
                </a>                <div class="dashboard-title">
                    <h1>Админ-панель</h1>
                    <p>Управление платформой и пользователями</p>
                </div>
            </div>
            <div class="dashboard-controls">
                <button class="dashboard-btn secondary" onclick="exportReport()">
                    <i class="bx bx-download"></i> Отчёт
                </button>
                <button class="dashboard-btn secondary" onclick="refreshStats()">
                    <i class="bx bx-refresh"></i> Обновить
                </button>                <button class="dashboard-btn" id="lcLogout" type="button" style="background: rgba(255,255,255,0.12);">
                    <i class="bx bx-log-out"></i> Выйти
                </button>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid" id="statsGrid">
            <div class="loading">
                <i class="bx bx-loader-alt"></i>
                <p>Загрузка статистики...</p>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title" id="chart1Title">Распределение по ролям</h3>
                </div>
                <canvas id="rolesChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title" id="chart2Title">Статистика постов</h3>
                </div>
                <canvas id="postsChart"></canvas>
            </div>
        </div>

        <!-- Recent Users Table -->
        <div class="table-card">
            <div class="table-header">
                <h3 class="table-title">Последние пользователи</h3>
                <button class="dashboard-btn secondary" onclick="alert('Полный список пользователей в разработке')">
                    <i class="bx bx-show"></i> Все пользователи
                </button>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Пользователь</th>
                        <th>Email</th>
                        <th>Роль</th>
                        <th>Статус</th>
                        <th>Дата регистрации</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="recentUsersTable">
                    <tr>
                        <td colspan="6" class="loading">
                            <i class="bx bx-loader-alt"></i> Загрузка...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Top Users Table -->
        <div class="table-card">
            <div class="table-header">
                <h3 class="table-title">Топ авторов</h3>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Пользователь</th>
                        <th>Роль</th>
                        <th>Публикаций</th>
                    </tr>
                </thead>
                <tbody id="topUsersTable">
                    <tr>
                        <td colspan="3" class="loading">
                            <i class="bx bx-loader-alt"></i> Загрузка...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let rolesChart = null;
        let postsChart = null;
        let currentData = null;
        let currentView = 'users';

        // Загрузка статистики
        async function loadStats() {
            try {
                const response = await fetch('/lc/admin/stats');
                const data = await response.json();
                
                if (data.error) {
                    console.error('Ошибка загрузки статистики:', data.error);
                    return;
                }

                currentData = data;
                renderStats(data);
                renderRecentUsers(data.recent_users);
                renderTopUsers(data.top_users);
                
                // Активируем первую карточку и отображаем графики
                setTimeout(() => switchView('users'), 100);
            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
                document.getElementById('statsGrid').innerHTML = `
                    <div class="loading" style="grid-column: 1 / -1;">
                        <i class="bx bx-error"></i>
                        <p>Ошибка загрузки статистики</p>
                    </div>
                `;
            }
        }

        // Переключение вида
        function switchView(view) {
            currentView = view;
            
            // Обновляем активную карточку
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
                if (card.dataset.view === view) {
                    card.classList.add('active');
                }
            });

            // Обновляем графики в зависимости от вида
            if (currentData) {
                updateChartsForView(view);
            }
        }

        // Обновление графиков для выбранного вида
        function updateChartsForView(view) {
            if (!currentData) return;

            const rolesCtx = document.getElementById('rolesChart').getContext('2d');
            const postsCtx = document.getElementById('postsChart').getContext('2d');
            const chart1Title = document.getElementById('chart1Title');
            const chart2Title = document.getElementById('chart2Title');

            // Уничтожаем старые графики
            if (rolesChart) rolesChart.destroy();
            if (postsChart) postsChart.destroy();

            switch(view) {
                case 'users':
                    chart1Title.textContent = 'Распределение по ролям';
                    chart2Title.textContent = 'Статистика постов';
                    
                    // График распределения по ролям
                    const roleLabels = {
                        'admin': 'Админы',
                        'smm': 'СММ',
                        'editor': 'Редакторы',
                        'observer': 'Наблюдатели',
                        'volunteer': 'Волонтёры'
                    };

                    const rolesData = Object.entries(currentData.users.by_role).map(([role, count]) => ({
                        role: roleLabels[role] || role,
                        count: count
                    }));

                    rolesChart = new Chart(rolesCtx, {
                        type: 'doughnut',
                        data: {
                            labels: rolesData.map(d => d.role),
                            datasets: [{
                                data: rolesData.map(d => d.count),
                                backgroundColor: [
                                    '#a855f7',
                                    '#3b82f6',
                                    '#10b981',
                                    '#f97316',
                                    '#6366f1'
                                ],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        color: '#e8e8e8',
                                        padding: 20
                                    }
                                }
                            }
                        }
                    });

                    // График статистики постов
                    postsChart = new Chart(postsCtx, {
                        type: 'bar',
                        data: {
                            labels: ['Опубликованные', 'На модерации', 'Черновики'],
                            datasets: [{
                                label: 'Посты',
                                data: [
                                    currentData.posts.published,
                                    currentData.posts.pending,
                                    currentData.posts.draft
                                ],
                                backgroundColor: [
                                    '#10b981',
                                    '#fbbf24',
                                    '#6366f1'
                                ],
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    display: false
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        color: '#e8e8e8'
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        color: '#e8e8e8'
                                    },
                                    grid: {
                                        display: false
                                    }
                                }
                            }
                        }
                    });
                    break;

                case 'active':
                    chart1Title.textContent = 'Активность пользователей';
                    chart2Title.textContent = 'Распределение по ролям';
                    
                    // График активности пользователей
                    rolesChart = new Chart(rolesCtx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Активные', 'Неактивные'],
                            datasets: [{
                                data: [
                                    currentData.users.active,
                                    currentData.users.total - currentData.users.active
                                ],
                                backgroundColor: ['#10b981', '#6366f1'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        color: '#e8e8e8',
                                        padding: 20
                                    }
                                }
                            }
                        }
                    });

                    // График по ролям (только активные)
                    const activeRolesData = Object.entries(currentData.users.by_role).map(([role, count]) => ({
                        role: role,
                        count: count
                    }));

                    postsChart = new Chart(postsCtx, {
                        type: 'bar',
                        data: {
                            labels: activeRolesData.map(d => d.role),
                            datasets: [{
                                label: 'Пользователи',
                                data: activeRolesData.map(d => d.count),
                                backgroundColor: '#3b82f6',
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    display: false
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        color: '#e8e8e8'
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        color: '#e8e8e8'
                                    },
                                    grid: {
                                        display: false
                                    }
                                }
                            }
                        }
                    });
                    break;

                case 'pending':
                    chart1Title.textContent = 'Статусы пользователей';
                    chart2Title.textContent = 'Посты на модерации';
                    
                    // График статусов пользователей
                    rolesChart = new Chart(rolesCtx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Активные', 'Ожидают', 'Заблокированные'],
                            datasets: [{
                                data: [
                                    currentData.users.active,
                                    currentData.users.pending,
                                    currentData.users.total - currentData.users.active - currentData.users.pending
                                ],
                                backgroundColor: ['#10b981', '#fbbf24', '#f43f5e'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        color: '#e8e8e8',
                                        padding: 20
                                    }
                                }
                            }
                        }
                    });

                    // График постов на модерации
                    postsChart = new Chart(postsCtx, {
                        type: 'bar',
                        data: {
                            labels: ['На модерации'],
                            datasets: [{
                                label: 'Посты',
                                data: [
                                    currentData.posts.pending
                                ],
                                backgroundColor: ['#fbbf24'],
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    display: false
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        color: '#e8e8e8'
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        color: '#e8e8e8'
                                    },
                                    grid: {
                                        display: false
                                    }
                                }
                            }
                        }
                    });
                    break;

                case 'posts':
                    chart1Title.textContent = 'Статусы постов';
                    chart2Title.textContent = 'Активность по постам';
                    
                    // График статусов постов
                    rolesChart = new Chart(rolesCtx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Опубликованные', 'На модерации', 'Черновики'],
                            datasets: [{
                                data: [
                                    currentData.posts.published,
                                    currentData.posts.pending,
                                    currentData.posts.draft
                                ],
                                backgroundColor: ['#10b981', '#fbbf24', '#6366f1'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        color: '#e8e8e8',
                                        padding: 20
                                    }
                                }
                            }
                        }
                    });

                    // График активности по постам
                    postsChart = new Chart(postsCtx, {
                        type: 'bar',
                        data: {
                            labels: ['За неделю', 'Всего'],
                            datasets: [{
                                label: 'Новые посты',
                                data: [
                                    currentData.posts.new_this_week,
                                    currentData.posts.total
                                ],
                                backgroundColor: ['#a855f7', '#3b82f6'],
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    display: false
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        color: '#e8e8e8'
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        color: '#e8e8e8'
                                    },
                                    grid: {
                                        display: false
                                    }
                                }
                            }
                        }
                    });
                    break;
            }
        }

        // Отрисовка статистики
        function renderStats(data) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card border-purple" data-view="users" onclick="switchView('users')">
                    <div class="stat-label">Всего пользователей</div>
                    <div class="stat-value">${data.users.total}</div>
                    <div class="stat-subtext purple">+${data.users.new_this_week} за неделю</div>
                </div>
                <div class="stat-card border-blue" data-view="active" onclick="switchView('active')">
                    <div class="stat-label">Активных пользователей</div>
                    <div class="stat-value">${data.users.active}</div>
                    <div class="stat-subtext blue">${Math.round(data.users.active / data.users.total * 100)}% от общего</div>
                </div>
                <div class="stat-card border-orange" data-view="pending" onclick="switchView('pending')">
                    <div class="stat-label">Ожидают подтверждения</div>
                    <div class="stat-value">${data.users.pending}</div>
                    <div class="stat-subtext orange">Требуют внимания</div>
                </div>
                <div class="stat-card border-emerald" data-view="posts" onclick="switchView('posts')">
                    <div class="stat-label">Всего постов</div>
                    <div class="stat-value">${data.posts.total}</div>
                    <div class="stat-subtext emerald">+${data.posts.new_this_week} за неделю</div>
                </div>
            `;
        }



        // Отрисовка последних пользователей
        function renderRecentUsers(users) {
            const tableBody = document.getElementById('recentUsersTable');
            
            if (!users || users.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 20px;">
                            Нет пользователей
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = users.map(user => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 32px; height: 32px; background: linear-gradient(135deg, #a855f7, #6366f1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600;">
                                ${user.username.charAt(0).toUpperCase()}
                            </div>
                            <span>${user.username}</span>
                        </div>
                    </td>
                    <td>${user.email}</td>
                    <td><span class="role-badge">${user.role}</span></td>
                    <td><span class="status-badge ${user.status}">${user.status === 'active' ? 'Активен' : user.status === 'pending' ? 'Ожидает' : 'Заблокирован'}</span></td>
                    <td>${new Date(user.created_at).toLocaleDateString('ru-RU')}</td>
                    <td>
                        <div style="display: flex; gap: 8px;">
                            <button class="action-btn" onclick="alert('Редактирование пользователя: ${user.username}')" title="Редактировать">
                                <i class="bx bx-edit"></i>
                            </button>
                            ${user.status === 'pending' ? `
                                <button class="action-btn approve" onclick="alert('Подтверждение пользователя: ${user.username}')" title="Подтвердить">
                                    <i class="bx bx-check"></i>
                                </button>
                            ` : ''}
                            <button class="action-btn reject" onclick="alert('Блокировка пользователя: ${user.username}')" title="Заблокировать">
                                <i class="bx bx-block"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Отрисовка топ авторов
        function renderTopUsers(users) {
            const tableBody = document.getElementById('topUsersTable');
            
            if (!users || users.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align: center; padding: 20px;">
                            Нет данных
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = users.map((user, index) => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 32px; height: 32px; background: ${index < 3 ? 'linear-gradient(135deg, #fbbf24, #f97316)' : 'linear-gradient(135deg, #a855f7, #6366f1)'}; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600;">
                                ${index + 1}
                            </div>
                            <span>${user.username}</span>
                        </div>
                    </td>
                    <td><span class="role-badge">${user.role}</span></td>
                    <td>
                        <span style="font-size: 18px; font-weight: 700; color: #e8e8e8;">${user.post_count}</span>
                        <span style="font-size: 12px; color: rgba(255, 255, 255, 0.6);">публ.</span>
                    </td>
                </tr>
            `).join('');
        }

        // Экспорт отчета в PDF
        async function exportReport() {
            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="bx bx-loader-alt"></i> Генерация...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/admin/report');

                if (response.ok) {
                    // Создаем blob из ответа
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `medihub_report_${new Date().toISOString().slice(0,10)}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    alert('Ошибка при генерации отчета');
                }
            } catch (error) {
                console.error('Error exporting report:', error);
                alert('Произошла ошибка при генерации отчета');
            }

            // Восстанавливаем кнопку через 3 секунды
            setTimeout(() => {
                btn.innerHTML = '<i class="bx bx-download"></i> Отчёт';
                btn.disabled = false;
            }, 3000);
        }

        // Обновление статистики
        function refreshStats() {
            loadStats();
        }

        // Загрузка при старте
        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
    <script src="/static/script.js"></script>
</body>
</html>
