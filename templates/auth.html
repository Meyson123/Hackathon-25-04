<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация — Медиахаб</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="gradient-bg"></div>

    <div class="auth-container">

        <!-- ===== LOGIN FORM ===== -->
        <div class="auth-card" id="loginStep">
            <h1>Войти</h1>
            <p class="auth-subtitle">Введите данные для входа в систему</p>

            <form id="loginForm" novalidate>
                <div class="auth-input-group" id="loginUsernameGroup">
                    <input type="text" id="loginUsername" placeholder="Имя пользователя" autocomplete="username" required>
                    <i class="bx bxs-user"></i>
                </div>
                <div class="auth-error" id="loginUsernameError"></div>

                <div class="auth-input-group" id="loginPasswordGroup">
                    <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="current-password" required>
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <div class="auth-error" id="loginPasswordError"></div>

                <div class="auth-row">
                    <label>
                        <input type="checkbox" id="rememberMe">
                        Запомнить меня
                    </label>
                    <a href="#" id="forgotLink">Забыли пароль?</a>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">Авторизоваться</button>
            </form>

            <div class="auth-footer">
                <p>Нет аккаунта? <a href="#" id="goToReg">Зарегистрироваться</a></p>
            </div>
        </div>

        <!-- ===== REGISTRATION FORM ===== -->
        <div class="auth-card" id="regStep" style="display:none;">
            <h1>Регистрация</h1>

            <!-- Выбор роли -->
            <div class="role-buttons">
                <button type="button" class="role-btn" data-role="smm">
                    <i class="bx bx-edit"></i>
                    <span>СММ</span>
                </button>
                <button type="button" class="role-btn" data-role="volunteer">
                    <i class="bx bx-heart"></i>
                    <span>Волонтёр</span>
                </button>
            </div>

            <p class="auth-subtitle">
                Роль: <strong id="regRoleLabel">Не выбрана</strong>
            </p>
            <p class="auth-subtitle" style="margin-top:4px; font-size:.85rem; opacity:.7;">
                После регистрации потребуется подтверждение администратором.
            </p>

            <form id="regForm" novalidate>
                <input type="hidden" id="regRole" name="role" value="">

                <div class="auth-input-group" id="regNameGroup">
                    <input type="text" id="regName" placeholder="Имя пользователя" autocomplete="username" required>
                    <i class="bx bxs-user"></i>
                </div>
                <div class="auth-error" id="regNameError"></div>

                <div class="auth-input-group" id="regEmailGroup">
                    <input type="email" id="regEmail" placeholder="Email" autocomplete="email" required>
                    <i class="bx bxs-envelope"></i>
                </div>
                <div class="auth-error" id="regEmailError"></div>

                <div class="auth-input-group" id="regPasswordGroup">
                    <input type="password" id="regPassword" placeholder="Пароль" autocomplete="new-password" required>
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <div class="auth-error" id="regPasswordError"></div>

                <div class="auth-input-group" id="regPassword2Group">
                    <input type="password" id="regPassword2" placeholder="Подтвердите пароль" autocomplete="new-password" required>
                    <i class="bx bxs-lock"></i>
                </div>
                <div class="auth-error" id="regPassword2Error"></div>

                <button type="submit" class="auth-btn" id="regBtn">Зарегистрироваться</button>
            </form>

            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="#" id="goToLogin">Войти</a></p>
            </div>
        </div>

    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="/static/script.js"></script>
</body>
</html>
