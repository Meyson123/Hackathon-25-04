<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Медиахаб</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="gradient-bg"></div>

    <div class="auth-container">
        <div class="auth-card" id="regCard">
            <h1>Регистрация</h1>
            <p class="auth-subtitle">
                Роль: <strong id="regRoleLabel">—</strong>
            </p>
            <p class="auth-subtitle" style="margin-top:4px; font-size:.85rem; opacity:.7;">
                После регистрации потребуется подтверждение администратором.
            </p>

            <form id="regForm" novalidate>
                <input type="hidden" id="regRole" name="role" value="">

                <div class="auth-input-group" id="regNameGroup">
                    <input type="text" id="regName" placeholder="Имя пользователя" autocomplete="username" required>
                    <i class="bx bxs-user"></i>
                </div>
                <div class="auth-error" id="regNameError"></div>

                <div class="auth-input-group" id="regEmailGroup">
                    <input type="email" id="regEmail" placeholder="Email" autocomplete="email" required>
                    <i class="bx bxs-envelope"></i>
                </div>
                <div class="auth-error" id="regEmailError"></div>

                <div class="auth-input-group" id="regPasswordGroup">
                    <input type="password" id="regPassword" placeholder="Пароль" autocomplete="new-password" required>
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <div class="auth-error" id="regPasswordError"></div>

                <div class="auth-input-group" id="regPassword2Group">
                    <input type="password" id="regPassword2" placeholder="Подтвердите пароль" autocomplete="new-password" required>
                    <i class="bx bxs-lock"></i>
                </div>
                <div class="auth-error" id="regPassword2Error"></div>

                <button type="submit" class="auth-btn" id="regBtn">Зарегистрироваться</button>
            </form>

            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="/auth#login">Войти</a></p>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="/static/script.js"></script>
</body>
</html>
